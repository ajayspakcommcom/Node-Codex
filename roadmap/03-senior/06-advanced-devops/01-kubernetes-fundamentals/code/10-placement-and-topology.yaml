apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-placement
  namespace: payments-prod
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api-placement
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api-placement
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload-class
                    operator: In
                    values:
                      - general
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: payments-api
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: payments-api
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
