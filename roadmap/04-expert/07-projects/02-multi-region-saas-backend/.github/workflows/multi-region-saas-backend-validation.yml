name: multi-region-saas-backend-validation

on:
  push:
    paths:
      - "roadmap/04-expert/07-projects/02-multi-region-saas-backend/**"
  pull_request:
    paths:
      - "roadmap/04-expert/07-projects/02-multi-region-saas-backend/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roadmap/04-expert/07-projects/02-multi-region-saas-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roadmap/04-expert/07-projects/02-multi-region-saas-backend/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run run:sample
