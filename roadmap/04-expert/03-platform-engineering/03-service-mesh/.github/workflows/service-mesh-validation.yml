name: service-mesh-validation

on:
  push:
    paths:
      - "roadmap/04-expert/03-platform-engineering/03-service-mesh/**"
  pull_request:
    paths:
      - "roadmap/04-expert/03-platform-engineering/03-service-mesh/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roadmap/04-expert/03-platform-engineering/03-service-mesh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roadmap/04-expert/03-platform-engineering/03-service-mesh/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run run:sample
