name: latency-optimization-validation

on:
  push:
    paths:
      - "roadmap/04-expert/05-performance/03-latency-optimization/**"
  pull_request:
    paths:
      - "roadmap/04-expert/05-performance/03-latency-optimization/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roadmap/04-expert/05-performance/03-latency-optimization
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roadmap/04-expert/05-performance/03-latency-optimization/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run run:sample
