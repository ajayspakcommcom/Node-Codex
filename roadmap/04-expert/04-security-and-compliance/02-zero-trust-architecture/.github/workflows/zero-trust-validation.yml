name: zero-trust-validation

on:
  push:
    paths:
      - "roadmap/04-expert/04-security-and-compliance/02-zero-trust-architecture/**"
  pull_request:
    paths:
      - "roadmap/04-expert/04-security-and-compliance/02-zero-trust-architecture/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roadmap/04-expert/04-security-and-compliance/02-zero-trust-architecture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roadmap/04-expert/04-security-and-compliance/02-zero-trust-architecture/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run run:sample
