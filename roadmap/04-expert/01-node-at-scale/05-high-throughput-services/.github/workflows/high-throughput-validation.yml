name: high-throughput-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-throughput-topic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roadmap/04-expert/01-node-at-scale/05-high-throughput-services/package.json

      - name: Install dependencies
        run: npm install
        working-directory: roadmap/04-expert/01-node-at-scale/05-high-throughput-services

      - name: Typecheck topic code
        run: npm run typecheck
        working-directory: roadmap/04-expert/01-node-at-scale/05-high-throughput-services

      - name: Run tests
        run: npm test
        working-directory: roadmap/04-expert/01-node-at-scale/05-high-throughput-services

      - name: Run overload scenario
        run: npm run run:overload
        working-directory: roadmap/04-expert/01-node-at-scale/05-high-throughput-services
