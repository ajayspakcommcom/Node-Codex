name: v8-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-v8-topic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: roadmap/04-expert/01-node-at-scale/03-v8-optimizations/package.json

      - name: Run tests
        run: npm test
        working-directory: roadmap/04-expert/01-node-at-scale/03-v8-optimizations

      - name: Run shape benchmark
        run: npm run bench:shapes
        working-directory: roadmap/04-expert/01-node-at-scale/03-v8-optimizations

      - name: Run serialization benchmark
        run: npm run bench:serialization
        working-directory: roadmap/04-expert/01-node-at-scale/03-v8-optimizations
