name: native-addon-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-native-addon:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        working-directory: roadmap/04-expert/01-node-at-scale/02-native-addons-cpp/code/workspace

      - name: Typecheck workspace
        run: pnpm typecheck
        working-directory: roadmap/04-expert/01-node-at-scale/02-native-addons-cpp/code/workspace

      - name: Validate fallback tests
        run: pnpm --filter @platform/native-image-hash test
        working-directory: roadmap/04-expert/01-node-at-scale/02-native-addons-cpp/code/workspace

      - name: Build native addon
        run: pnpm --filter @platform/native-image-hash build:native
        working-directory: roadmap/04-expert/01-node-at-scale/02-native-addons-cpp/code/workspace
